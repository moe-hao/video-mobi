name: build

on:
  push:
    branches: [ "main", "test" ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      mobi: ${{ steps.filter.outputs.mobi }}
      mobi-web: ${{ steps.filter.outputs.mobi-web }}
      manage: ${{ steps.filter.outputs.manage }}
      manage-web: ${{ steps.filter.outputs.manage-web }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobi:
              - 'app/mobi/**'
              - 'lib/**'
            mobi-web:
              - 'app/mobi-web/**'
              - 'lib/common/**'
            manage:
              - 'app/manage/**'
              - 'lib/**'
            manage-web:
              - 'app/manage-web/**'
              - 'lib/common/**'
            

  build-mobi:
    needs: changes
    if: ${{ needs.changes.outputs.mobi == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Build Value
        id: build
        run: |
          echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push mobi
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/mobi/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/video-mobi/mobi:${{ steps.build.outputs.branch }}-${{ steps.build.outputs.timestamp }}-${{ steps.build.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mobi-web:
    needs: changes
    if: ${{ needs.changes.outputs.mobi-web == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Build App
        run: |
          pnpm install
          pnpm build

      - name: Get Build Value
        id: build
        run: |
          echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: video-mobi-web-${{ steps.build.outputs.branch }}-${{ steps.build.outputs.timestamp }}-${{ steps.build.outputs.short_sha }}
          path: dist
          retention-days: 7

  build-manage:
    needs: changes
    if: ${{ needs.changes.outputs.manage == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Build Value
        id: build
        run: |
          echo "short_sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push manage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app/manage/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/video-mobi/manage:${{ steps.build.outputs.branch }}-${{ steps.build.outputs.timestamp }}-${{ steps.build.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
